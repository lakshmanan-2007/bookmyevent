<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="560" fill="#0f1226"/>
  <text x="450" y="34" fill="#c9ccf5" font-size="20" font-weight="bold" text-anchor="middle">BookMyEvent — Scaled Architecture</text>

  <!-- Users -->
  <rect x="360" y="56" width="180" height="42" rx="8" fill="#7c5cff"/>
  <text x="450" y="82" fill="#fff" font-size="14" text-anchor="middle" font-weight="bold">Users (Browser)</text>

  <!-- CDN / Vercel -->
  <rect x="330" y="122" width="240" height="46" rx="8" fill="#151b2e" stroke="#33334a"/>
  <text x="450" y="150" fill="#e6e9f5" font-size="13" text-anchor="middle">CDN / Vercel — Next.js frontend</text>

  <!-- Load Balancer -->
  <rect x="360" y="192" width="180" height="42" rx="8" fill="#151b2e" stroke="#33334a"/>
  <text x="450" y="218" fill="#e6e9f5" font-size="13" text-anchor="middle">Load Balancer</text>

  <!-- API instances -->
  <g font-size="12" text-anchor="middle">
    <rect x="150" y="272" width="150" height="46" rx="8" fill="#1a2340" stroke="#4a7bf0"/>
    <text x="225" y="300" fill="#dfe6ff">Spring Boot API #1</text>
    <rect x="375" y="272" width="150" height="46" rx="8" fill="#1a2340" stroke="#4a7bf0"/>
    <text x="450" y="300" fill="#dfe6ff">Spring Boot API #2</text>
    <rect x="600" y="272" width="150" height="46" rx="8" fill="#1a2340" stroke="#4a7bf0"/>
    <text x="675" y="300" fill="#dfe6ff">Spring Boot API #N</text>
  </g>
  <text x="450" y="340" fill="#9aa0b5" font-size="11" text-anchor="middle">stateless (JWT) — scales horizontally</text>

  <!-- Redis -->
  <rect x="300" y="380" width="300" height="52" rx="8" fill="#3a1e10" stroke="#f0932b"/>
  <text x="450" y="402" fill="#ffcf9e" font-size="13" text-anchor="middle" font-weight="bold">Redis</text>
  <text x="450" y="420" fill="#ffcf9e" font-size="11" text-anchor="middle">distributed lock · shared cache · global rate-limit counters</text>

  <!-- Postgres primary + replicas -->
  <rect x="180" y="470" width="230" height="52" rx="8" fill="#0e2a1c" stroke="#34d399"/>
  <text x="295" y="492" fill="#b6f5d8" font-size="13" text-anchor="middle" font-weight="bold">PostgreSQL (primary)</text>
  <text x="295" y="510" fill="#b6f5d8" font-size="11" text-anchor="middle">writes — bookings, users, events</text>
  <rect x="490" y="470" width="230" height="52" rx="8" fill="#0e2a1c" stroke="#34d399"/>
  <text x="605" y="492" fill="#b6f5d8" font-size="13" text-anchor="middle" font-weight="bold">Read Replicas</text>
  <text x="605" y="510" fill="#b6f5d8" font-size="11" text-anchor="middle">reads — scale-out</text>

  <!-- arrows -->
  <g stroke="#5b6088" stroke-width="2" fill="none" marker-end="url(#a)">
    <path d="M450,98 V122"/>
    <path d="M450,168 V192"/>
    <path d="M450,234 V262 M450,262 H225 V272 M450,262 H675 V272"/>
    <path d="M225,318 V390 H300 M675,318 V390 H600 M450,318 V380"/>
    <path d="M295,432 V470 M605,432 V470"/>
    <path d="M410,496 H490" stroke-dasharray="4 4"/>
  </g>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6088"/>
    </marker>
  </defs>
</svg>
