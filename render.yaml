# Render Blueprint - backend only (database = Supabase, frontend = Vercel).
# In Render: New > Blueprint > pick this repo > Apply.
# You'll be prompted for JDBC_URL, DB_USER, DB_PASSWORD (from Supabase).
services:
  - type: web
    name: bookmyevent-api
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /api/events
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # jdbc:postgresql://aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require
      - key: JDBC_URL
        sync: false
      # postgres.<your-project-ref>
      - key: DB_USER
        sync: false
      # your Supabase database password
      - key: DB_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ORIGINS
        value: "*"
